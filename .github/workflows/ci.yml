name: CI

on:
  pull_request:
    branches:
      - main
      - develop
jobs:
  # ─── Unit Tests ──────────────────────────────────────────────────────────────

  backend-tests:
    name: Backend Unit Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Run unit tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: todo-app/coverage.xml

  frontend-tests:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo-app-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: todo-app-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: todo-app-frontend/coverage/

  # ─── CodeQL Security Analysis ────────────────────────────────────────────────

  codeql:
    name: CodeQL Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Set up Python (for Python analysis)
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies (for Python analysis)
        if: matrix.language == 'python'
        run: pip install -r todo-app/requirements.txt

      - name: Set up Node.js (for JS/TS analysis)
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: todo-app-frontend/package-lock.json

      - name: Install Node.js dependencies (for JS/TS analysis)
        if: matrix.language == 'javascript-typescript'
        working-directory: todo-app-frontend
        run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

  # ─── Merge Gate ──────────────────────────────────────────────────────────────

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
      - codeql
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          results=(
            "backend-tests=${{ needs.backend-tests.result }}"
            "frontend-tests=${{ needs.frontend-tests.result }}"
            "codeql (python)=${{ needs.codeql.result }}"
            "codeql (javascript-typescript)=${{ needs.codeql.result }}"
          )
          failed=0
          for r in "${results[@]}"; do
            name="${r%%=*}"
            status="${r##*=}"
            if [[ "$status" != "success" ]]; then
              echo "FAILED: $name ($status)"
              failed=1
            else
              echo "PASSED: $name"
            fi
          done
          if [[ $failed -eq 1 ]]; then
            echo ""
            echo "One or more checks failed. Blocking merge."
            exit 1
          fi
          echo ""
          echo "All checks passed. Ready to merge."
