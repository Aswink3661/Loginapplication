apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-frontend
  namespace: loginapp-dev
  labels:
    app: todo-app-frontend
    project: loginapp
    environment: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app-frontend
  template:
    metadata:
      labels:
        app: todo-app-frontend
        project: loginapp
        environment: dev
    spec:
      containers:
        - name: frontend
          # Replace with your ECR image URI after pushing
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/loginapp-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
