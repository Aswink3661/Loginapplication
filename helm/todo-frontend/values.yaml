# Default values for todo-frontend.
# Override per environment with values-<env>.yaml or --set flags.

# ── Namespace ─────────────────────────────────────────────────────────────────
namespace:
  create: true
  name: loginapp-dev
  labels:
    project: loginapp
    environment: dev

# ── Image ─────────────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/aswink3661/todo-app-frontend
  tag: ""          # Populated automatically by CI/CD (e.g. sha-a1b2c3d)
  pullPolicy: Always

# ── Replica count ─────────────────────────────────────────────────────────────
replicaCount: 2

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 80

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: "200"
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

# ── Probes ────────────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# ── Nginx ConfigMap ───────────────────────────────────────────────────────────
nginx:
  # Name of the backend service that nginx will proxy /api/ and /health to
  backendServiceName: todo-app-backend
  backendPort: 8000

# ── Labels ────────────────────────────────────────────────────────────────────
labels:
  project: loginapp
  environment: dev
