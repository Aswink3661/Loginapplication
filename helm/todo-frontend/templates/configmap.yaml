apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: {{ include "todo-frontend.namespace" . }}
  labels:
    {{- include "todo-frontend.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      # React SPA – fallback to index.html for client-side routing
      location / {
        try_files $uri $uri/ /index.html;
      }

      # Proxy API requests to the backend service
      location /api/ {
        proxy_pass         http://{{ .Values.nginx.backendServiceName }}:{{ .Values.nginx.backendPort }}/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
      }

      # Proxy health endpoint to the backend service
      location /health {
        proxy_pass         http://{{ .Values.nginx.backendServiceName }}:{{ .Values.nginx.backendPort }}/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
      }
    }
